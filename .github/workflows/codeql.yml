name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Tuesday 17:29 UTC; the cadence GitHub seeds in templates.
    - cron: '29 17 * * 2'

# Cancel superseded runs on the same branch / PR so a fast-pushing PR
# doesn't pile up CodeQL minutes. The weekly schedule still runs unmolested.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (rust)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          # Clear the workflow token from `.git/config` after fetch so
          # subsequent CodeQL extractor runs can't leak it.
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        with:
          languages: rust
          # `none` skips compilation; CodeQL's Rust extractor analyzes
          # sources directly. Faster and works for libraries that don't
          # need a full build to surface issues.
          build-mode: none
          # `security-extended` adds higher-confidence-but-noisier rules;
          # `security-and-quality` adds maintainability/style checks.
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        with:
          category: "/language:rust"

  # Stable name for branch protection so adding languages or splitting the
  # analyze job later doesn't require editing the protection rule.
  codeql-required:
    name: CodeQL required
    if: always()
    needs:
      - analyze
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Verify every dependency succeeded
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS"
          echo "$NEEDS" | jq -e 'to_entries | all(.value.result == "success")' >/dev/null
