# cSpell:ignore taplo dtolnay RUSTFLAGS Dwarnings
name: Rust CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

# Default to least-privilege; CI jobs only need to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same branch / PR. Saves runner minutes when
# a contributor pushes several commits in quick succession.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Rust ${{ matrix.rust }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Promote dep-side warnings to errors only in the test job. Doing this
      # at the workflow level would also affect build scripts of dependencies,
      # so a future dep release emitting a deprecation warning would break CI
      # through no fault of ours.
      RUSTFLAGS: "-Dwarnings"
    strategy:
      fail-fast: false
      matrix:
        # Pin to the exact MSRV (1.74.0). `"1.74"` would resolve to the
        # latest 1.74.x patch and let a regression in a patch release ride
        # in undetected.
        rust: [stable, "1.74.0"]

    steps:
    - uses: actions/checkout@v4
      with:
        # PR jobs build untrusted code; clear the workflow token from
        # `.git/config` so a malicious build script can't exfiltrate it.
        persist-credentials: false
    # Third-party actions are SHA-pinned per
    # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-third-party-actions.
    # `dtolnay/rust-toolchain` ships no versioned tags, so the trailing `# stable`
    # comment tracks intent. Dependabot keeps the SHA fresh on its weekly run.
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      with:
        toolchain: ${{ matrix.rust }}

    - name: Build
      run: cargo build --verbose --locked

    - name: Run tests
      run: cargo test --verbose --locked

    - name: Build with embed-module-info
      run: cargo build --verbose --features embed-module-info --locked

    - name: Run tests with embed-module-info
      run: cargo test --verbose --features embed-module-info --locked

  examples:
    name: Build & test example (${{ matrix.example }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        example:
          - sample_elf_bin
          - sample_elf_bin_with_lib
          - sample_lib
          - sample_builder_api
          - sample_info_api
          - sample_crashing_process
    steps:
    - uses: actions/checkout@v4
      with:
        # PR jobs build untrusted code; clear the workflow token from
        # `.git/config` so a malicious build script can't exfiltrate it.
        persist-credentials: false
    - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
    # Examples deliberately do NOT pass `--locked`. Each example crate is a
    # standalone Cargo package and `.gitignore` excludes `examples/**/Cargo.lock`,
    # so there is no committed lockfile for `--locked` to honor; adding it
    # would fail every example job with "cannot create the lock file because
    # --locked was passed". Examples regenerate their lock fresh per build.
    - name: Build example
      working-directory: examples/${{ matrix.example }}
      run: cargo build --verbose
    # Run the example's own tests too. Historically this job ran only
    # `cargo build`, which let the three binary-example test gates on
    # `#[cfg(feature = "embed-module-info")]` silently skip every test
    # they were meant to cover (those feature gates live on the
    # *dependency*, not on the binary crate, so they evaluated false).
    # The cfg gates are gone now, but running `cargo test` here is what
    # actually catches that class of bug in the future.
    - name: Test example
      working-directory: examples/${{ matrix.example }}
      run: cargo test --verbose

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
      with:
        # PR jobs build untrusted code; clear the workflow token from
        # `.git/config` so a malicious build script can't exfiltrate it.
        persist-credentials: false
    - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      with:
        components: rustfmt
    - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4
      with:
        # PR jobs build untrusted code; clear the workflow token from
        # `.git/config` so a malicious build script can't exfiltrate it.
        persist-credentials: false
    - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      with:
        components: clippy
    - name: Clippy (default features)
      run: cargo clippy --all-targets --locked -- -D warnings
    - name: Clippy (embed-module-info)
      run: cargo clippy --all-targets --features embed-module-info --locked -- -D warnings
    # `--all-features` future-proofs against new features landing without
    # clippy coverage. Runs last so feature-specific failures are easier
    # to attribute.
    - name: Clippy (all features)
      run: cargo clippy --all-targets --all-features --locked -- -D warnings

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUSTDOCFLAGS: "-Dwarnings"
    steps:
    - uses: actions/checkout@v4
      with:
        # PR jobs build untrusted code; clear the workflow token from
        # `.git/config` so a malicious build script can't exfiltrate it.
        persist-credentials: false
    - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
    - name: Generate documentation
      run: cargo doc --no-deps --features embed-module-info --locked

  taplo:
    name: TOML format (taplo)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
      with:
        # PR jobs build untrusted code; clear the workflow token from
        # `.git/config` so a malicious build script can't exfiltrate it.
        persist-credentials: false
    # Pin taplo to a known release. Bump deliberately when updating; do not
    # float to "latest". The .gz is downloaded first, sha256-verified, then
    # decompressed; guards against a tampered or partial download (HTTPS
    # alone doesn't protect against a compromised release asset).
    - name: Install taplo
      run: |
        set -euo pipefail
        EXPECTED_SHA=8fe196b894ccf9072f98d4e1013a180306e17d244830b03986ee5e8eabeb6156
        curl -fsSL --retry 3 \
          https://github.com/tamasfe/taplo/releases/download/0.10.0/taplo-linux-x86_64.gz \
          -o /tmp/taplo.gz
        echo "${EXPECTED_SHA}  /tmp/taplo.gz" | sha256sum --check -
        gunzip /tmp/taplo.gz
        chmod +x /tmp/taplo
    # `RUST_LOG=warn` suppresses taplo's INFO-level startup spam; the check
    # itself still reports diff hunks at error level on any drift.
    - run: /tmp/taplo fmt --check
      env:
        RUST_LOG: warn

  markdownlint:
    name: Markdown lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4
      with:
        # PR jobs build untrusted code; clear the workflow token from
        # `.git/config` so a malicious build script can't exfiltrate it.
        persist-credentials: false
    - uses: DavidAnson/markdownlint-cli2-action@992badcdf24e3b8eb7e87ff9287fe931bcb00c6e # v20.0.0
      with:
        globs: "**/*.md"

  package-list:
    name: cargo package (dry-run)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
      with:
        # PR jobs build untrusted code; clear the workflow token from
        # `.git/config` so a malicious build script can't exfiltrate it.
        persist-credentials: false
    - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
    # Inspect the file list that `cargo publish` would upload. Catches
    # internal files leaking into the published tarball if the `exclude`
    # block in Cargo.toml drifts. `--allow-dirty` keeps the check robust
    # against incidental working-tree noise on the runner.
    - run: cargo package --list --allow-dirty --locked

  advisories:
    name: Security advisories (cargo-deny)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4
      with:
        # PR jobs build untrusted code; clear the workflow token from
        # `.git/config` so a malicious build script can't exfiltrate it.
        persist-credentials: false
    - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
    - name: Run cargo-deny
      uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb # v2.0.17
      with:
        # `check all` runs advisories + bans + licenses + sources. For an
        # OSS crate on crates.io the licenses check is particularly valuable
        # since an accidentally-pulled GPL transitive dep would silently break
        # the crate's `license = "MIT"` claim.
        command: check all
